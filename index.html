<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="style.css" type="text/css" rel="stylesheet">
</head>
<body>
    <div class="main-body">
        <div class="calc-body">
            <div>
                <input type="text" id="screen">
            </div>
            <div class="buttons">
                <div class="keysection">
                    <button onclick="clicked(7)" class="btn">7</button>
                    <button onclick="clicked(8)" class="btn">8</button>
                    <button onclick="clicked(9)" class="btn">9</button>
                    <button onclick="clicked('+')" class="btn">+</button>
                </div>
                <div class="keysection">
                    <button onclick="clicked(4)" class="btn">4</button>
                    <button onclick="clicked(5)" class="btn">5</button>
                    <button onclick="clicked(6)" class="btn">6</button>
                    <button onclick="clicked('-')" class="btn">-</button>
                </div>
                <div class="keysection">
                    <button onclick="clicked(1)" class="btn">1</button>
                    <button onclick="clicked(2)" class="btn">2</button>
                    <button onclick="clicked(3)" class="btn">3</button>
                    <button onclick="clicked('*')" class="btn">x</button>
                </div>
                <div class="keysection">
                    <button onclick="clicked(0)" class="btn">0</button>
                    <button onclick="decimalSign()" class="btn">.</button>
                    <button onclick="percentSign()" class="btn">%</button>
                    <button onclick="clicked('/')" class="btn">/</button>
                </div>
                <div class="keysection">
                    <button onclick="negativeVal()" class="btn">(-)</button>
                    <button onclick="backSpace()" class="btn">del</button>
                    <button onclick="clearScreen()" class="btn">clear</button>
                    <button onclick="equalSign()" class="btn">=</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
