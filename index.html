<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="style.css" type="text/css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row main-body justify-content-center align-items-center min-vh-100 bg-black">
            <div class="col-md-6 col-12 calc-body bg-dark text-center pb-2">
                <div>
                    <input type="text" id="screen" class="bg-success w-100 mt-2">
                </div>
                <div class="buttons bg-light">
                    <div class="keysection p-1 mt-2">
                        <button onclick="clicked(7)" class="btns btn btn-dark">7</button>
                        <button onclick="clicked(8)" class="btns btn btn-dark">8</button>
                        <button onclick="clicked(9)" class="btns btn btn-dark">9</button>
                        <button onclick="clicked('+')" class="btns btn btn-primary">+</button>
                    </div>
                    <div class="keysection p-1">
                        <button onclick="clicked(4)" class="btns btn btn-dark">4</button>
                        <button onclick="clicked(5)" class="btns btn btn-dark">5</button>
                        <button onclick="clicked(6)" class="btns btn btn-dark">6</button>
                        <button onclick="clicked('-')" class="btns btn btn-primary">-</button>
                    </div>
                    <div class="keysection p-1">
                        <button onclick="clicked(1)" class="btns btn btn-dark">1</button>
                        <button onclick="clicked(2)" class="btns btn btn-dark">2</button>
                        <button onclick="clicked(3)" class="btns btn btn-dark">3</button>
                        <button onclick="clicked('*')" class="btns btn btn-primary">x</button>
                    </div>
                    <div class="keysection p-1">
                        <button onclick="clicked(0)" class="btns btn btn-dark">0</button>
                        <button onclick="decimalSign()" class="btns btn btn-info">.</button>
                        <button onclick="percentSign()" class="btns btn btn-info">%</button>
                        <button onclick="clicked('/')" class="btns btn btn-primary">/</button>
                    </div>
                    <div class="keysection p-1">
                        <button onclick="negativeVal()" class="btns btn btn-info">(-)</button>
                        <button onclick="backSpace()" class="btns btn btn-warning">del</button>
                        <button onclick="clearScreen()" class="btns btn btn-danger">clear</button>
                        <button onclick="equalSign()" class="btns btn btn-success">=</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
